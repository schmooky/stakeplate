name: Release

# Publishes @stakeplate/core to npm via OIDC TRUSTED PUBLISHING when a v* tag is
# pushed — no long-lived NPM_TOKEN secret (same setup as schmooky/zvuk, pixi-reels,
# open-slot-ui).
#
#   # bump packages/core/package.json version, commit, then:
#   git tag v0.1.0 && git push origin main v0.1.0
#
# ── One-time npm setup (npmjs.com, by a @stakeplate scope owner) ──
#   Package @stakeplate/core → Settings → Trusted Publisher → GitHub Actions:
#     Organization or user: schmooky
#     Repository:           stakeplate
#     Workflow filename:    release.yml
#     Environment:          npm-publish
#   Then create the `npm-publish` GitHub Environment on the repo.

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: build · test · publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Do NOT set registry-url — it would seed a placeholder token and skip OIDC.

      # OIDC trusted publishing needs npm >= 11.5.1 (Node 22 ships 10.9).
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test

      # Publishes every PUBLIC workspace package (currently @stakeplate/core), converting
      # workspace:* to real versions. Private packages (apps, emulator) are skipped.
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: 'true'
